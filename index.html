<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tela de Login</title>
</head>
<body>
    <div class="content" id="content">
        <!-- Tela de login -->
        <div class="text-login" id="text-login">
            <h1>Login</h1>
            <div class="social-login" id="social-login">
                   <p>Logar com :</p>
                    <a href="#" class="social-icon"><img src="img/pesquisa.png" alt="Google"></a>
                    <a href="#" class="social-icon"><img src="img/facebook.png" alt="Facebook"></a>
                    <a href="#" class="social-icon"><img src="img/github (2).png" alt="GitHub"></a>
            </div>
            <form>
                <label for="username">Nome de Usuário:</label>
                <input type="text" id="username" name="username" required>
                <br>
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
                <br>
                <p>Esqueceu sua senha? <a href="javascript:void(0)" onclick="mostrarEsqueciSenha()" >Esqueci minha senha</a></p>
                <p>Não possui uma conta? <a onclick="mostrarCadastro()" style="cursor: pointer;">Cadastrar-se</a></p>

                
                <button type="submit">Entrar</button>
            </form>
        </div>

        <!-- Tela de cadastro -->
        <div class="text-cadastro" id="text-cadastro">
            <h1>Cadastro</h1>
            <form>
                <label for="new-username">Nome de Usuário:</label>
                <input type="text" id="new-username" name="new-username" required>
                <br>
                <label for="new-email">Email:
                <input type="email" id="new-email" name="new-email" required>
                </label>
                <br>
                <label for="new-password">Senha:</label>
                <input type="password" id="new-password" name="new-password" required>
                <br>
                <p>Já possui uma conta? <a onclick="mostrarLogin()" style="cursor: pointer;">Fazer login</a></p>
                <button type="submit">Registrar</button>
            </form>
        </div>
        <div class="overlay" id="overlay"></div>
    </div>
    

    <script>

function mostrarCadastro(){
    document.getElementById("overlay").classList.add("mover");
}

function mostrarLogin(){
    document.getElementById("overlay").classList.remove("mover");
}

</script>
</body>
</html>
